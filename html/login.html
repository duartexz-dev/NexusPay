<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusPay - Login</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../style.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>

    <!-- Ambient background animations -->
    <div class="interactive-glow" id="mouse-glow"></div>
    <div class="glow-sphere c1"></div>
    <div class="glow-sphere c2"></div>

    <div class="login-page-container">

        <!-- Logo with iconic hive -->
        <header class="nebula-logo-container">
            <h1 class="logo-text"><i class='bx bx-hive'></i> NexusPay</h1>
        </header>

        <!-- Main Panel -->
        <main class="login-panel">
            <div class="login-header">
                <h2>BEM-VINDO DE VOLTA</h2>
                <p>Insira suas credenciais para gerenciar seu patrimônio.</p>
            </div>

            <!-- Formulário sem reload -->
            <form class="login-form" onsubmit="event.preventDefault(); confirmLogin();">
                <!-- Email -->
                <div class="input-group">
                    <label for="email" aria-label="E-mail"><i class='bx bx-envelope'></i></label>
                    <input type="email" id="email" placeholder="E-mail" required autocomplete="email">
                </div>

                <!-- Senha -->
                <div class="input-group">
                    <label for="senha" aria-label="Senha"><i class='bx bx-lock-alt'></i></label>
                    <input type="password" id="senha" placeholder="Senha" required autocomplete="current-password">
                </div>

                <!-- Botão -->
                <button style="display: flex;" id="btnConfirm" type="submit" class="btn-primary btn-login"
                    onclick="confirmLogin()">
                    Confirmar
                </button>

                <button style="display: none;" type="submit" id="btnEnter" class="btn-primary btn-login">
                    <a style="text-decoration: none; color: rgb(0, 0, 0);" href="./home.html">Entrar</a>
                </button>


                <a style="color: rgb(255, 255, 255); text-decoration: none; " href="../index.html">Não tem conta?</a>

            </div>



        </main>

    </div>

    <!-- Scripts -->
    <script src="../js/Login.js"></script>
    <script>
        // Interactive Mouse Glow Tracker
        const glow = document.getElementById('mouse-glow');
        if (glow) {
            document.addEventListener('mousemove', (e) => {
                glow.style.left = e.clientX + 'px';
                glow.style.top = e.clientY + 'px';
            });
        }
    </script>
</body>

</html>
